name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build
        run: |
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          export TZ=Asia/Shanghai
          buildTime=$(date +'%Y-%m-%d %H:%M:%S')
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w -X 'main.buildSha=${{ github.sha }}' -X 'main.buildTime=${buildTime}'" \
            -o "sshx-${{ matrix.goos }}-${{ matrix.goarch }}${ext}" .
          echo "R=sshx-${{ matrix.goos }}-${{ matrix.goarch }}${ext}" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sshx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.R }}

  release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          for d in sshx-*; do
            cp "$d/sshx-"* . 2>/dev/null || true
          done
          sha256sum sshx-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Changes

            See [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}).

            ## Install

            ```bash
            # go install
            go install github.com/${{ github.repository }}@${{ github.ref_name }}
            ```
          files: |
            artifacts/sshx-*
            artifacts/checksums.txt
          generate_release_notes: true
