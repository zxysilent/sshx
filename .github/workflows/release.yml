name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        include:
          # linux
          - { goos: linux,   goarch: amd64   }
          - { goos: linux,   goarch: arm64   }
          - { goos: linux,   goarch: 386     }
          - { goos: linux,   goarch: arm     }
          - { goos: linux,   goarch: riscv64 }
          - { goos: linux,   goarch: loong64 }
          - { goos: linux,   goarch: ppc64le }
          - { goos: linux,   goarch: s390x   }
          # darwin
          - { goos: darwin,  goarch: amd64   }
          - { goos: darwin,  goarch: arm64   }
          # windows
          - { goos: windows, goarch: amd64   }
          - { goos: windows, goarch: arm64   }
          - { goos: windows, goarch: 386     }
          # freebsd
          - { goos: freebsd, goarch: amd64   }
          - { goos: freebsd, goarch: arm64   }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build
        run: |
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          export TZ=Asia/Shanghai
          buildTime=$(date +'%Y-%m-%d %H:%M:%S')
          # ARMv7 for linux/arm (defaults to ARMv6 in Go, but ARMv7 is more common)
          GOARM=""
          [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "arm" ] && GOARM="GOARM=7"
          CGO_ENABLED=0 ${GOARM} GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w -X 'main.buildSha=${{ github.sha }}' -X 'main.buildTime=${buildTime}'" \
            -o "sshx-${{ matrix.goos }}-${{ matrix.goarch }}${ext}" .
          echo "R=sshx-${{ matrix.goos }}-${{ matrix.goarch }}${ext}" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sshx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.R }}

  release:
    needs: build-release
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -name 'sshx-*' -exec cp -v {} release/ \;
          echo "=== downloaded artifacts ==="
          find artifacts -type f | sort
          echo "=== release assets ==="
          ls -la release/
          cd release && sha256sum sshx-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Changes

            See [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}).

            ## Install

            ```bash
            # go install
            go install github.com/${{ github.repository }}@${{ github.ref_name }}
            ```
          files: |
            release/sshx-*
            release/checksums.txt
          generate_release_notes: true
